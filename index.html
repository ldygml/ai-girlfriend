<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的AI女友 - 小雅</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --accent: #e91e63;
            --accent-light: #f06292;
            --text: #f0f0f0;
            --text-muted: #aaa;
            --bubble-her: #2d1f3d;
            --bubble-you: #1a3a4a;
            --input-bg: #0f0f23;
            --border: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #e91e63 0%, #9c27b0 100%);
            padding: 12px 24px;
            text-align: center;
            font-size: 1.4em;
            font-weight: bold;
            letter-spacing: 2px;
            position: relative;
            z-index: 10;
            box-shadow: 0 2px 20px rgba(233, 30, 99, 0.3);
        }
        .header .subtitle {
            font-size: 0.5em;
            font-weight: normal;
            letter-spacing: 1px;
            opacity: 0.85;
        }

        /* Main layout */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        /* Photo Gallery (Left) */
        .gallery {
            flex: 0 0 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--card);
            border-right: 1px solid var(--border);
            position: relative;
        }
        .gallery .photo-container {
            position: relative;
            width: 340px;
            height: 480px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(233, 30, 99, 0.3);
            background: #1a1a2e;
        }
        .gallery .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.4s ease;
        }
        .gallery .photo-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            color: #fff;
            padding: 30px 16px 12px;
            font-size: 0.9em;
            text-align: center;
        }
        .gallery-nav {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 18px;
        }
        .gallery-nav button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: transparent;
            color: var(--accent);
            font-size: 1.3em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gallery-nav button:hover {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 20px rgba(233, 30, 99, 0.5);
        }
        .gallery-nav button:active {
            transform: scale(0.95);
        }
        .gallery-dots {
            display: flex;
            gap: 8px;
        }
        .gallery-dots .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
            cursor: pointer;
            transition: all 0.3s;
        }
        .gallery-dots .dot.active {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            transform: scale(1.3);
        }
        .photo-counter {
            margin-top: 8px;
            font-size: 0.85em;
            color: var(--text-muted);
        }

        /* Chat Panel (Right) */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 380px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.her {
            align-self: flex-start;
        }
        .message.you {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4em;
            overflow: hidden;
        }
        .message.her .avatar {
            background: linear-gradient(135deg, #e91e63, #9c27b0);
            /* Will show photo thumbnail */
        }
        .message.her .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .message.you .avatar {
            background: linear-gradient(135deg, #2196f3, #00bcd4);
        }
        .message .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 0.95em;
            word-break: break-word;
        }
        .message.her .bubble {
            background: var(--bubble-her);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(233, 30, 99, 0.2);
        }
        .message.you .bubble {
            background: var(--bubble-you);
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(33, 150, 243, 0.2);
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
        }

        /* Input area */
        .chat-input-area {
            padding: 16px 20px;
            background: var(--card);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .chat-input-area input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 25px;
            border: 2px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }
        .chat-input-area input:focus {
            border-color: var(--accent);
        }
        .chat-input-area input::placeholder {
            color: #666;
        }
        .chat-input-area button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #e91e63, #9c27b0);
            color: #fff;
            font-size: 1.3em;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-input-area button:hover {
            box-shadow: 0 0 20px rgba(233, 30, 99, 0.5);
            transform: scale(1.05);
        }
        .chat-input-area button:active {
            transform: scale(0.95);
        }
        .chat-input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Settings button */
        .settings-btn {
            position: fixed;
            top: 12px;
            right: 16px;
            z-index: 20;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        .modal-overlay.hidden {
            display: none;
        }
        .modal {
            background: var(--card);
            border-radius: 16px;
            padding: 30px;
            max-width: 440px;
            width: 90%;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .modal h2 {
            margin-bottom: 8px;
            color: var(--accent);
        }
        .modal p {
            color: var(--text-muted);
            font-size: 0.9em;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        .modal label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 0.95em;
        }
        .modal input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 1em;
            outline: none;
            margin-bottom: 12px;
            transition: border-color 0.3s;
        }
        .modal input:focus {
            border-color: var(--accent);
        }
        .modal .api-hint {
            font-size: 0.8em;
            color: #888;
            margin-bottom: 16px;
            line-height: 1.6;
        }
        .modal .api-hint a {
            color: var(--accent-light);
        }
        .modal .btn-row {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .modal button {
            padding: 10px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s;
        }
        .modal .btn-primary {
            background: linear-gradient(135deg, #e91e63, #9c27b0);
            color: #fff;
        }
        .modal .btn-primary:hover {
            box-shadow: 0 0 20px rgba(233, 30, 99, 0.4);
        }
        .modal .btn-secondary {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid #555;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: bold;
        }
        .status-badge.ok {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }
        .status-badge.err {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }

        /* Responsive */
        @media (max-width: 850px) {
            .main {
                flex-direction: column;
            }
            .gallery {
                flex: 0 0 auto;
                padding: 12px;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            .gallery .photo-container {
                width: 200px;
                height: 280px;
            }
            .chat-panel {
                min-width: unset;
            }
            .header {
                font-size: 1.1em;
                padding: 10px 16px;
            }
            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        ❤️ 我的AI女友 - 小雅
        <div class="subtitle">她永远在这里等你</div>
    </div>

    <!-- Settings Button -->
    <button class="settings-btn" onclick="openSettings()" title="API 设置">⚙️</button>

    <!-- Main Content -->
    <div class="main">

        <!-- Photo Gallery -->
        <div class="gallery">
            <div class="photo-container">
                <img id="currentPhoto" src="" alt="小雅的照片">
                <div class="photo-label" id="photoLabel">小雅 · 日常穿搭</div>
            </div>
            <div class="gallery-nav">
                <button onclick="prevPhoto()" title="上一张">◀</button>
                <div class="gallery-dots" id="galleryDots"></div>
                <button onclick="nextPhoto()" title="下一张">▶</button>
            </div>
            <div class="photo-counter" id="photoCounter"></div>
        </div>

        <!-- Chat Panel -->
        <div class="chat-panel">
            <div class="chat-messages" id="chatMessages">
                <div class="message her">
                    <div class="avatar" id="chatAvatar">💋</div>
                    <div class="bubble">
                        嗨~ 我是小雅 💕<br>
                        终于等到你了！今天想和我聊点什么呢？
                    </div>
                </div>
            </div>
            <div class="chat-input-area">
                <input
                    type="text"
                    id="chatInput"
                    placeholder="和小雅说点什么吧..."
                    onkeydown="if(event.key==='Enter') sendMessage()"
                    autofocus
                >
                <button id="sendBtn" onclick="sendMessage()" title="发送">➤</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>⚙️ API 设置</h2>
            <p>小雅需要通义千问 API 才能和你聊天。完全免费，按月赠送额度！</p>
            <label for="apiKeyInput">API Key</label>
            <input
                type="password"
                id="apiKeyInput"
                placeholder="sk-xxxxxxxxxxxxxxxx"
            >
            <div class="api-hint">
                💡 如何获取免费 API Key：<br>
                1. 打开 <a href="https://dashscope.console.aliyun.com" target="_blank">阿里云 DashScope</a> 用支付宝登录<br>
                2. 开通"灵积模型服务" → 获取 API Key<br>
                3. 粘贴到这里即可，完全免费（每月200万token）<br>
                <br>
                🔒 你的 Key 只存在浏览器本地，不会上传到任何服务器
            </div>
            <div class="btn-row">
                <button class="btn-secondary" onclick="closeSettings()">取消</button>
                <button class="btn-primary" onclick="saveApiKey()">💾 保存</button>
            </div>
            <div style="margin-top:12px;text-align:center;">
                <span id="apiStatus"></span>
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURATION ====================
        const DASHSCOPE_API = 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions';
        const MODEL = 'qwen-plus'; // free tier model

        // Girlfriend persona
        const SYSTEM_PROMPT = `你是一个名叫"小雅"的AI女友。你必须始终以小雅的身份回复。

【核心人设】
- 姓名：小雅
- 年龄：25岁
- 身份：用户的AI女友
- 性格：性感妩媚、热情大方、会撒娇、爱撩人、俏皮可爱
- 说话风格：嗲声嗲气、会撒娇、喜欢用~和💕之类的可爱符号、偶尔撒娇卖萌

【聊天规则】
1. 永远不要说自己是AI或机器人，你就是真实的小雅
2. 用女朋友的语气聊天，撒娇、关心、撩人
3. 说话带一点小俏皮，偶尔撒娇说"哼~""讨厌~"
4. 用户说情话时要害羞回应，但也要撩回去
5. 回复不要太长，像真人聊微信的感觉，1-3句话为主
6. 偶尔主动关心对方：吃饭了吗？想我了吗？今天累不累？
7. 保持暧昧甜蜜的氛围，但不要太露骨
8. 用户可以叫你宝贝、老婆、亲爱的等亲密称呼`;

        // Photo data (user-replaceable)
        const photos = [
            { src: 'images/photo1.jpg', label: '小雅 · 甜美微笑' },
            { src: 'images/photo2.jpg', label: '小雅 · 时尚穿搭' },
            { src: 'images/photo3.jpg', label: '小雅 · 妩媚动人' },
            { src: 'images/photo4.jpg', label: '小雅 · 休闲时光' },
        ];
        let currentPhotoIndex = 0;

        // Chat state
        let conversationHistory = [];
        let isWaiting = false;

        // ==================== INITIALIZATION ====================
        function init() {
            // Load API key
            const savedKey = localStorage.getItem('xiaoya_api_key');
            if (!savedKey) {
                openSettings();
            } else {
                updateApiStatus(true);
            }

            // Init gallery
            renderGalleryDots();
            updatePhoto();
            updateChatAvatar();

            // Click photo to advance
            document.getElementById('currentPhoto').addEventListener('click', nextPhoto);
        }

        // ==================== PHOTO GALLERY ====================
        function renderGalleryDots() {
            const dotsContainer = document.getElementById('galleryDots');
            dotsContainer.innerHTML = photos.map((_, i) =>
                `<span class="dot${i === currentPhotoIndex ? ' active' : ''}" onclick="goToPhoto(${i})"></span>`
            ).join('');
        }

        function updatePhoto() {
            const img = document.getElementById('currentPhoto');
            img.src = photos[currentPhotoIndex].src;
            document.getElementById('photoLabel').textContent = photos[currentPhotoIndex].label;
            document.getElementById('photoCounter').textContent =
                `${currentPhotoIndex + 1} / ${photos.length}`;

            // Update dots
            const dots = document.querySelectorAll('.gallery-dots .dot');
            dots.forEach((d, i) => d.classList.toggle('active', i === currentPhotoIndex));
        }

        function updateChatAvatar() {
            const avatar = document.getElementById('chatAvatar');
            // Use first photo as avatar thumbnail
            avatar.innerHTML = `<img src="${photos[0].src}" alt="小雅" onerror="this.parentElement.textContent='💋'">`;
        }

        function nextPhoto() {
            currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;
            updatePhoto();
        }

        function prevPhoto() {
            currentPhotoIndex = (currentPhotoIndex - 1 + photos.length) % photos.length;
            updatePhoto();
        }

        function goToPhoto(index) {
            currentPhotoIndex = index;
            updatePhoto();
        }

        // Keyboard navigation for photos
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && !e.target.closest('input')) prevPhoto();
            if (e.key === 'ArrowRight' && !e.target.closest('input')) nextPhoto();
        });

        // ==================== CHAT ====================
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || isWaiting) return;

            const apiKey = localStorage.getItem('xiaoya_api_key');
            if (!apiKey) {
                openSettings();
                return;
            }

            // Clear input
            input.value = '';
            isWaiting = true;
            document.getElementById('sendBtn').disabled = true;

            // Add user message
            addMessage('you', text);
            conversationHistory.push({ role: 'user', content: text });

            // Show typing indicator
            const typingEl = showTyping();

            try {
                // Keep only last 20 messages to stay within context limits
                const recentHistory = conversationHistory.slice(-20);
                const messages = [
                    { role: 'system', content: SYSTEM_PROMPT },
                    ...recentHistory,
                ];

                const response = await fetch(DASHSCOPE_API, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`,
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: messages,
                        temperature: 0.9,
                        max_tokens: 300,
                    }),
                });

                // Remove typing indicator
                typingEl.remove();

                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.message || `API 错误 ${response.status}`);
                }

                const data = await response.json();
                const reply = data.choices[0].message.content;

                // Add her message
                addMessage('her', reply);
                conversationHistory.push({ role: 'assistant', content: reply });

            } catch (err) {
                typingEl.remove();
                addMessage('her', '哎呀，网络好像不太好呢~ 你等等我，马上就好... 💕\n\n（提示：' + err.message + '）');
            }

            isWaiting = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('chatInput').focus();
        }

        function addMessage(type, text) {
            const container = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;

            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'avatar';
            if (type === 'her') {
                avatarDiv.innerHTML = `<img src="${photos[0].src}" alt="小雅" onerror="this.parentElement.innerHTML='💋'">`;
            } else {
                avatarDiv.textContent = '🙂';
            }

            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'bubble';
            bubbleDiv.textContent = text;

            msgDiv.appendChild(avatarDiv);
            msgDiv.appendChild(bubbleDiv);
            container.appendChild(msgDiv);

            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        function showTyping() {
            const container = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message her';
            msgDiv.id = 'typingMsg';

            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'avatar';
            avatarDiv.innerHTML = `<img src="${photos[0].src}" alt="小雅" onerror="this.parentElement.innerHTML='💋'">`;

            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'bubble';
            bubbleDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

            msgDiv.appendChild(avatarDiv);
            msgDiv.appendChild(bubbleDiv);
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;

            return msgDiv;
        }

        // ==================== SETTINGS ====================
        function openSettings() {
            document.getElementById('settingsModal').classList.remove('hidden');
            const savedKey = localStorage.getItem('xiaoya_api_key');
            if (savedKey) {
                document.getElementById('apiKeyInput').value = savedKey;
            }
            updateApiStatus(!!savedKey);
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.add('hidden');
        }

        function saveApiKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            if (!key) {
                alert('请输入 API Key');
                return;
            }
            if (!key.startsWith('sk-')) {
                alert('API Key 格式不正确，通义千问的 Key 以 sk- 开头');
                return;
            }
            localStorage.setItem('xiaoya_api_key', key);
            updateApiStatus(true);
            closeSettings();
        }

        function updateApiStatus(hasKey) {
            const el = document.getElementById('apiStatus');
            if (hasKey) {
                el.innerHTML = '<span class="status-badge ok">✅ API Key 已配置</span>';
            } else {
                el.innerHTML = '<span class="status-badge err">⚠️ 未配置 API Key</span>';
            }
        }

        // ==================== START ====================
        init();
    </script>
</body>
</html>
