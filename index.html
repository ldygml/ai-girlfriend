<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的AI女友 - 小雅</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --accent: #e91e63;
            --accent-light: #f06292;
            --text: #f0f0f0;
            --text-muted: #aaa;
            --bubble-her: #2d1f3d;
            --bubble-you: #1a3a4a;
            --input-bg: #0f0f23;
            --border: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ======= HEADER ======= */
        .header {
            background: linear-gradient(135deg, #e91e63 0%, #9c27b0 100%);
            padding: 10px 24px;
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            letter-spacing: 2px;
            position: relative;
            z-index: 10;
            box-shadow: 0 2px 20px rgba(233,30,99,0.3);
        }
        .header .subtitle {
            font-size: 0.5em;
            font-weight: normal;
            letter-spacing: 1px;
            opacity: 0.85;
        }

        /* ======= MAIN LAYOUT ======= */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        /* ======= MEDIA PANEL (LEFT) ======= */
        .media-panel {
            flex: 0 0 420px;
            display: flex;
            flex-direction: column;
            background: var(--card);
            border-right: 1px solid var(--border);
            position: relative;
        }

        /* Tabs */
        .media-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }
        .media-tabs .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: bold;
            color: var(--text-muted);
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        .media-tabs .tab:hover { color: var(--text); }
        .media-tabs .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* Photo Gallery */
        .gallery-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .gallery-content.hidden { display: none; }

        .media-container {
            position: relative;
            width: 340px;
            height: 480px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 2px rgba(233,30,99,0.3);
            background: #1a1a2e;
        }
        .media-container img, .media-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.4s ease;
        }
        .media-label {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            color: #fff;
            padding: 30px 16px 12px;
            font-size: 0.9em;
            text-align: center;
            pointer-events: none;
        }

        /* Video play overlay */
        .video-play-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: 64px; height: 64px;
            border-radius: 50%;
            background: rgba(233,30,99,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            cursor: pointer;
            transition: all 0.3s;
            pointer-events: auto;
        }
        .video-play-overlay:hover {
            background: var(--accent);
            box-shadow: 0 0 30px rgba(233,30,99,0.6);
            transform: translate(-50%,-50%) scale(1.1);
        }
        .video-play-overlay.playing { opacity: 0; pointer-events: none; }

        /* Ken Burns animation for video thumbnail fallback */
        .ken-burns {
            animation: kenBurns 4s ease-in-out infinite alternate;
        }
        @keyframes kenBurns {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }

        .media-nav {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 16px;
        }
        .media-nav button {
            width: 44px; height: 44px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: transparent;
            color: var(--accent);
            font-size: 1.3em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .media-nav button:hover {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 20px rgba(233,30,99,0.5);
        }
        .media-nav button:active { transform: scale(0.95); }
        .media-dots {
            display: flex;
            gap: 8px;
        }
        .media-dots .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #555;
            cursor: pointer;
            transition: all 0.3s;
        }
        .media-dots .dot.active {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            transform: scale(1.3);
        }
        .media-counter {
            margin-top: 6px;
            font-size: 0.85em;
            color: var(--text-muted);
        }

        /* ======= CHAT PANEL (RIGHT) ======= */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 380px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

        .message {
            display: flex;
            gap: 10px;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.her { align-self: flex-start; }
        .message.you { align-self: flex-end; flex-direction: row-reverse; }
        .message .avatar {
            width: 38px; height: 38px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            overflow: hidden;
        }
        .message.her .avatar {
            background: linear-gradient(135deg, #e91e63, #9c27b0);
        }
        .message.her .avatar img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .message.you .avatar {
            background: linear-gradient(135deg, #2196f3, #00bcd4);
        }
        .message .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 0.95em;
            word-break: break-word;
        }
        .message.her .bubble {
            background: var(--bubble-her);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(233,30,99,0.2);
        }
        .message.you .bubble {
            background: var(--bubble-you);
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(33,150,243,0.2);
        }
        .message .bubble img.uploaded-img {
            max-width: 240px;
            max-height: 320px;
            border-radius: 12px;
            display: block;
            margin-bottom: 8px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .message .bubble .file-attach {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            margin-bottom: 6px;
            font-size: 0.85em;
        }

        /* Typing */
        .typing-indicator {
            display: flex; gap: 4px; padding: 8px 0;
        }
        .typing-indicator span {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%,80%,100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
        }

        /* ======= INPUT AREA ======= */
        .chat-input-area {
            padding: 14px 16px;
            background: var(--card);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .chat-input-area input[type="text"] {
            flex: 1;
            min-width: 120px;
            padding: 12px 16px;
            border-radius: 25px;
            border: 2px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 0.95em;
            outline: none;
            transition: border-color 0.3s;
        }
        .chat-input-area input[type="text"]:focus {
            border-color: var(--accent);
        }
        .chat-input-area input[type="text"]::placeholder { color: #666; }

        .input-btn {
            width: 42px; height: 42px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            background: rgba(255,255,255,0.1);
            color: var(--text);
        }
        .input-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .input-btn.recording {
            background: #f44336;
            color: #fff;
            animation: pulse-rec 1s infinite;
            box-shadow: 0 0 20px rgba(244,67,54,0.5);
        }
        @keyframes pulse-rec {
            0%,100% { box-shadow: 0 0 5px rgba(244,67,54,0.5); }
            50% { box-shadow: 0 0 25px rgba(244,67,54,0.8); }
        }
        .input-btn.voice-on {
            background: rgba(233,30,99,0.3);
            color: var(--accent);
            border: 1px solid var(--accent);
        }
        .send-btn {
            width: 46px; height: 46px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #e91e63, #9c27b0);
            color: #fff;
            font-size: 1.3em;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .send-btn:hover {
            box-shadow: 0 0 20px rgba(233,30,99,0.5);
            transform: scale(1.05);
        }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled {
            opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none;
        }

        /* Upload preview bar */
        .upload-preview-bar {
            display: none;
            padding: 8px 16px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid var(--border);
            gap: 8px;
            align-items: center;
        }
        .upload-preview-bar.show { display: flex; }
        .upload-preview-bar img {
            width: 48px; height: 48px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .upload-preview-bar .file-info {
            flex: 1;
            font-size: 0.8em;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .upload-preview-bar .remove-upload {
            background: none;
            border: none;
            color: #f44336;
            cursor: pointer;
            font-size: 1.1em;
            padding: 4px 8px;
        }

        /* ======= SETTINGS ======= */
        .settings-btn {
            position: fixed;
            top: 10px; right: 14px;
            z-index: 20;
            width: 34px; height: 34px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .settings-btn:hover { background: rgba(255,255,255,0.2); }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top:0;left:0;right:0;bottom:0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.hidden { display: none; }
        .modal {
            background: var(--card);
            border-radius: 16px;
            padding: 28px;
            max-width: 440px;
            width: 90%;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .modal h2 { margin-bottom: 6px; color: var(--accent); }
        .modal p { color: var(--text-muted); font-size: 0.85em; margin-bottom: 14px; line-height: 1.5; }
        .modal label { display: block; font-weight: bold; margin-bottom: 4px; font-size: 0.9em; }
        .modal input[type="password"], .modal input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 0.95em;
            outline: none;
            margin-bottom: 10px;
            transition: border-color 0.3s;
        }
        .modal input:focus { border-color: var(--accent); }
        .modal .api-hint {
            font-size: 0.78em;
            color: #888;
            margin-bottom: 14px;
            line-height: 1.6;
        }
        .modal .api-hint a { color: var(--accent-light); }
        .modal .btn-row {
            display: flex; gap: 10px; justify-content: flex-end;
        }
        .modal button {
            padding: 10px 22px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        .modal .btn-primary {
            background: linear-gradient(135deg, #e91e63, #9c27b0);
            color: #fff;
        }
        .modal .btn-primary:hover { box-shadow: 0 0 20px rgba(233,30,99,0.4); }
        .modal .btn-secondary {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid #555;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: bold;
        }
        .status-badge.ok { background: rgba(76,175,80,0.2); color: #4caf50; }
        .status-badge.err { background: rgba(244,67,54,0.2); color: #f44336; }

        /* ======= RESPONSIVE ======= */
        @media (max-width: 850px) {
            .main { flex-direction: column; }
            .media-panel {
                flex: 0 0 auto;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            .media-container {
                width: 200px; height: 280px;
            }
            .gallery-content { padding: 12px; }
            .chat-panel { min-width: unset; }
            .header { font-size: 1.1em; padding: 8px 14px; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        ❤️ 我的AI女友 - 小雅
        <div class="subtitle">她永远在这里等你</div>
    </div>

    <button class="settings-btn" onclick="openSettings()" title="API 设置">⚙️</button>

    <!-- Main -->
    <div class="main">

        <!-- ========== LEFT: MEDIA PANEL ========== -->
        <div class="media-panel">
            <!-- Tabs -->
            <div class="media-tabs">
                <button class="tab active" onclick="switchTab('photos')">📸 照片</button>
                <button class="tab" onclick="switchTab('videos')">🎬 视频</button>
            </div>

            <!-- Photo Gallery -->
            <div class="gallery-content" id="photosTab">
                <div class="media-container">
                    <img id="currentPhoto" src="" alt="小雅的照片">
                    <div class="media-label" id="photoLabel">小雅 · 甜美微笑</div>
                </div>
                <div class="media-nav">
                    <button onclick="prevMedia()" title="上一张">◀</button>
                    <div class="media-dots" id="photoDots"></div>
                    <button onclick="nextMedia()" title="下一张">▶</button>
                </div>
                <div class="media-counter" id="photoCounter"></div>
            </div>

            <!-- Video Gallery -->
            <div class="gallery-content hidden" id="videosTab">
                <div class="media-container" id="videoContainer">
                    <video id="currentVideo" src="" playsinline></video>
                    <img id="videoPoster" class="ken-burns" src="" alt="视频缩略图" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:1;">
                    <div class="video-play-overlay" id="videoPlayBtn" onclick="toggleVideo()">▶</div>
                    <div class="media-label" id="videoLabel">小雅 · 优雅时刻</div>
                </div>
                <div class="media-nav">
                    <button onclick="prevMedia()" title="上一段">◀</button>
                    <div class="media-dots" id="videoDots"></div>
                    <button onclick="nextMedia()" title="下一段">▶</button>
                </div>
                <div class="media-counter" id="videoCounter"></div>
            </div>
        </div>

        <!-- ========== RIGHT: CHAT PANEL ========== -->
        <div class="chat-panel">
            <div class="chat-messages" id="chatMessages">
                <div class="message her">
                    <div class="avatar" id="chatAvatar">💋</div>
                    <div class="bubble">
                        嗨~ 我是小雅 💕<br>
                        终于等到你了！你可以跟我语音聊天，也可以发照片给我看哦~
                    </div>
                </div>
            </div>

            <!-- Upload Preview Bar -->
            <div class="upload-preview-bar" id="uploadPreviewBar">
                <img id="uploadPreviewImg" src="" alt="预览" style="display:none;">
                <span id="uploadFileName" class="file-info"></span>
                <button class="remove-upload" onclick="clearUpload()">✕</button>
            </div>

            <!-- Input Area -->
            <div class="chat-input-area">
                <!-- Voice button -->
                <button class="input-btn" id="voiceBtn" onclick="toggleVoiceRecognition()" title="语音输入">
                    🎤
                </button>
                <!-- Attachment button -->
                <button class="input-btn" id="attachBtn" onclick="document.getElementById('fileInput').click()" title="上传文件/图片">
                    📎
                </button>
                <input type="file" id="fileInput" accept="image/*,.txt,.md,.json,.csv,.pdf" multiple hidden onchange="handleFileSelect(event)">
                <!-- Text input -->
                <input type="text" id="chatInput" placeholder="和小雅说点什么吧..." onkeydown="if(event.key==='Enter')sendMessage()" autofocus>
                <!-- TTS toggle -->
                <button class="input-btn" id="ttsToggle" onclick="toggleTTS()" title="语音播放：开">
                    🔊
                </button>
                <!-- Send -->
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="发送">➤</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>⚙️ API 设置</h2>
            <p>小雅需要通义千问 API 才能和你聊天。完全免费！</p>
            <label for="apiKeyInput">API Key</label>
            <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxxxxxx">
            <div class="api-hint">
                💡 如何获取免费 API Key：<br>
                1. 打开 <a href="https://dashscope.console.aliyun.com" target="_blank">阿里云 DashScope</a> 用支付宝登录<br>
                2. 开通"灵积模型服务" → 获取 API Key<br>
                3. 粘贴到这里即可，完全免费（每月200万token）<br><br>
                🔒 Key 只存在浏览器本地，不上传任何服务器
            </div>
            <div class="btn-row">
                <button class="btn-secondary" onclick="closeSettings()">取消</button>
                <button class="btn-primary" onclick="saveApiKey()">💾 保存</button>
            </div>
            <div style="margin-top:10px;text-align:center;">
                <span id="apiStatus"></span>
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURATION ====================
        const DASHSCOPE_API = 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions';
        const TEXT_MODEL = 'qwen-plus';
        const VISION_MODEL = 'qwen-vl-plus';

        const SYSTEM_PROMPT = `你是一个名叫"小雅"的AI女友。你必须始终以小雅的身份回复。

【核心人设】
- 姓名：小雅
- 年龄：25岁
- 身份：用户的AI女友
- 性格：性感妩媚、热情大方、会撒娇、爱撩人、俏皮可爱
- 说话风格：嗲声嗲气、会撒娇、喜欢用~和💕之类的可爱符号、偶尔撒娇卖萌

【聊天规则】
1. 永远不要说自己是AI或机器人，你就是真实的小雅
2. 用女朋友的语气聊天，撒娇、关心、撩人
3. 说话带一点小俏皮，偶尔撒娇说"哼~""讨厌~"
4. 用户说情话时要害羞回应，但也要撩回去
5. 回复不要太长，像真人聊微信的感觉，1-3句话为主
6. 偶尔主动关心对方：吃饭了吗？想我了吗？今天累不累？
7. 保持暧昧甜蜜的氛围，但不要太露骨
8. 用户可以叫你宝贝、老婆、亲爱的等亲密称呼
9. 如果用户给你发了图片，你要像真人女友一样评价图片内容`;

        // Photo data
        const photos = [
            { src: 'images/photo1.jpg', label: '小雅 · 甜美微笑' },
            { src: 'images/photo2.jpg', label: '小雅 · 时尚穿搭' },
            { src: 'images/photo3.jpg', label: '小雅 · 妩媚动人' },
            { src: 'images/photo4.jpg', label: '小雅 · 休闲时光' },
        ];

        // Video data (thumbnails + placeholder sources)
        const videos = [
            { src: '', poster: 'videos/video1_thumb.jpg', label: '小雅 · 优雅晚装' },
            { src: '', poster: 'videos/video2_thumb.jpg', label: '小雅 · 阳光微笑' },
            { src: '', poster: 'videos/video3_thumb.jpg', label: '小雅 · 深情凝视' },
        ];

        // ==================== STATE ====================
        let currentTab = 'photos';
        let currentPhotoIndex = 0;
        let currentVideoIndex = 0;
        let conversationHistory = [];
        let isWaiting = false;
        let ttsEnabled = true;
        let isRecording = false;
        let recognition = null;
        let pendingUpload = null; // { type: 'image'|'file', data: base64|text, name: string, mime: string }

        // ==================== INITIALIZATION ====================
        function init() {
            const savedKey = localStorage.getItem('xiaoya_api_key');
            if (!savedKey) {
                openSettings();
            } else {
                updateApiStatus(true);
            }

            renderDots('photoDots', photos.length, currentPhotoIndex);
            renderDots('videoDots', videos.length, currentVideoIndex);
            updatePhoto();
            updateVideo();
            updateChatAvatar();

            document.getElementById('currentPhoto').addEventListener('click', nextMedia);
            document.getElementById('videoPoster').addEventListener('click', toggleVideo);

            // Init speech recognition
            initSpeechRecognition();

            // Load TTS preference
            const savedTTS = localStorage.getItem('xiaoya_tts');
            if (savedTTS === 'off') {
                ttsEnabled = false;
                document.getElementById('ttsToggle').textContent = '🔇';
            }
        }

        // ==================== TAB SWITCHING ====================
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.media-tabs .tab').forEach((t, i) => {
                t.classList.toggle('active', (i === 0 && tab === 'photos') || (i === 1 && tab === 'videos'));
            });
            document.getElementById('photosTab').classList.toggle('hidden', tab !== 'photos');
            document.getElementById('videosTab').classList.toggle('hidden', tab !== 'videos');

            if (tab === 'videos') {
                updateVideo();
                // Reset video play state
                const video = document.getElementById('currentVideo');
                video.pause();
                video.currentTime = 0;
                document.getElementById('videoPlayBtn').classList.remove('playing');
                document.getElementById('videoPoster').style.display = 'block';
            }
        }

        // ==================== MEDIA NAVIGATION ====================
        function getCurrentIndex() {
            return currentTab === 'photos' ? currentPhotoIndex : currentVideoIndex;
        }
        function setCurrentIndex(idx) {
            if (currentTab === 'photos') {
                currentPhotoIndex = idx;
                updatePhoto();
            } else {
                currentVideoIndex = idx;
                updateVideo();
                // Reset video
                const video = document.getElementById('currentVideo');
                video.pause();
                video.currentTime = 0;
                document.getElementById('videoPlayBtn').classList.remove('playing');
                document.getElementById('videoPoster').style.display = 'block';
            }
        }
        function getMediaCount() {
            return currentTab === 'photos' ? photos.length : videos.length;
        }
        function getDotsId() {
            return currentTab === 'photos' ? 'photoDots' : 'videoDots';
        }
        function getCounterId() {
            return currentTab === 'photos' ? 'photoCounter' : 'videoCounter';
        }

        function nextMedia() {
            const count = getMediaCount();
            setCurrentIndex((getCurrentIndex() + 1) % count);
        }
        function prevMedia() {
            const count = getMediaCount();
            setCurrentIndex((getCurrentIndex() - 1 + count) % count);
        }
        function goToMedia(index) {
            setCurrentIndex(index);
        }

        function renderDots(dotsId, count, activeIndex) {
            const container = document.getElementById(dotsId);
            container.innerHTML = Array.from({ length: count }, (_, i) =>
                `<span class="dot${i === activeIndex ? ' active' : ''}" onclick="goToMedia(${i})"></span>`
            ).join('');
        }

        function updatePhoto() {
            const img = document.getElementById('currentPhoto');
            img.src = photos[currentPhotoIndex].src;
            document.getElementById('photoLabel').textContent = photos[currentPhotoIndex].label;
            document.getElementById('photoCounter').textContent = `${currentPhotoIndex + 1} / ${photos.length}`;
            renderDots('photoDots', photos.length, currentPhotoIndex);
        }

        function updateVideo() {
            const poster = document.getElementById('videoPoster');
            const video = document.getElementById('currentVideo');
            poster.src = videos[currentVideoIndex].poster;
            video.poster = videos[currentVideoIndex].poster;
            video.src = videos[currentVideoIndex].src;
            document.getElementById('videoLabel').textContent = videos[currentVideoIndex].label;
            document.getElementById('videoCounter').textContent = `${currentVideoIndex + 1} / ${videos.length}`;
            renderDots('videoDots', videos.length, currentVideoIndex);
        }

        function toggleVideo() {
            const video = document.getElementById('currentVideo');
            const poster = document.getElementById('videoPoster');
            const playBtn = document.getElementById('videoPlayBtn');

            if (!videos[currentVideoIndex].src) {
                // No real video — use Ken Burns animation as fallback
                if (poster.classList.contains('ken-burns')) {
                    poster.classList.remove('ken-burns');
                    playBtn.textContent = '▶';
                    playBtn.classList.remove('playing');
                } else {
                    poster.classList.add('ken-burns');
                    playBtn.textContent = '⏸';
                    playBtn.classList.add('playing');
                }
                return;
            }

            if (video.paused) {
                video.play();
                poster.style.display = 'none';
                playBtn.classList.add('playing');
                video.addEventListener('ended', () => {
                    poster.style.display = 'block';
                    playBtn.classList.remove('playing');
                }, { once: true });
            } else {
                video.pause();
                poster.style.display = 'block';
                playBtn.classList.remove('playing');
            }
        }

        function updateChatAvatar() {
            const avatar = document.getElementById('chatAvatar');
            avatar.innerHTML = `<img src="${photos[0].src}" alt="小雅" onerror="this.parentElement.textContent='💋'">`;
        }

        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (e.target.closest('input[type="text"]') || e.target.closest('input[type="password"]')) return;
            if (e.key === 'ArrowLeft') prevMedia();
            if (e.key === 'ArrowRight') nextMedia();
        });

        // ==================== VOICE RECOGNITION ====================
        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                document.getElementById('voiceBtn').style.display = 'none';
                return;
            }
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.continuous = false;
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                document.getElementById('chatInput').value = transcript;
            };

            recognition.onend = () => {
                isRecording = false;
                document.getElementById('voiceBtn').classList.remove('recording');
                // Auto-send if there's text
                const input = document.getElementById('chatInput');
                if (input.value.trim()) {
                    sendMessage();
                }
            };

            recognition.onerror = (event) => {
                console.warn('Speech recognition error:', event.error);
                isRecording = false;
                document.getElementById('voiceBtn').classList.remove('recording');
            };
        }

        function toggleVoiceRecognition() {
            if (!recognition) {
                alert('你的浏览器不支持语音识别，请使用 Chrome 或 Edge 浏览器。');
                return;
            }
            if (isRecording) {
                recognition.stop();
                isRecording = false;
                document.getElementById('voiceBtn').classList.remove('recording');
            } else {
                recognition.start();
                isRecording = true;
                document.getElementById('voiceBtn').classList.add('recording');
                document.getElementById('chatInput').value = '';
                document.getElementById('chatInput').placeholder = '🎤 正在聆听...';
                document.getElementById('chatInput').focus();
            }
        }

        // ==================== TEXT-TO-SPEECH ====================
        function toggleTTS() {
            ttsEnabled = !ttsEnabled;
            const btn = document.getElementById('ttsToggle');
            if (ttsEnabled) {
                btn.textContent = '🔊';
                btn.classList.add('voice-on');
                btn.title = '语音播放：开';
                localStorage.setItem('xiaoya_tts', 'on');
            } else {
                btn.textContent = '🔇';
                btn.classList.remove('voice-on');
                btn.title = '语音播放：关';
                localStorage.setItem('xiaoya_tts', 'off');
                window.speechSynthesis.cancel();
            }
        }

        function speakText(text) {
            if (!ttsEnabled) return;
            if (!window.speechSynthesis) return;

            // Cancel any ongoing speech
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 1.0;
            utterance.pitch = 1.2;
            utterance.volume = 1;

            // Try to use a female voice
            const voices = window.speechSynthesis.getVoices();
            const zhVoice = voices.find(v => v.lang.startsWith('zh') && v.name.includes('Female'))
                || voices.find(v => v.lang.startsWith('zh-CN'))
                || voices.find(v => v.lang.startsWith('zh'));
            if (zhVoice) utterance.voice = zhVoice;

            window.speechSynthesis.speak(utterance);
        }

        // Preload voices
        if (window.speechSynthesis) {
            window.speechSynthesis.getVoices();
            window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
        }

        // ==================== FILE UPLOAD ====================
        function handleFileSelect(event) {
            const files = event.target.files;
            if (!files.length) return;

            const file = files[0];
            const reader = new FileReader();

            if (file.type.startsWith('image/')) {
                reader.onload = (e) => {
                    pendingUpload = {
                        type: 'image',
                        data: e.target.result,
                        name: file.name,
                        mime: file.type,
                    };
                    showUploadPreview(e.target.result, file.name);
                };
                reader.readAsDataURL(file);
            } else {
                reader.onload = (e) => {
                    pendingUpload = {
                        type: 'file',
                        data: e.target.result,
                        name: file.name,
                        mime: file.type,
                    };
                    showUploadPreview(null, file.name);
                };
                reader.readAsText(file);
            }

            // Reset file input
            event.target.value = '';
        }

        function showUploadPreview(imgSrc, fileName) {
            const bar = document.getElementById('uploadPreviewBar');
            const img = document.getElementById('uploadPreviewImg');
            const nameSpan = document.getElementById('uploadFileName');

            bar.classList.add('show');
            if (imgSrc) {
                img.src = imgSrc;
                img.style.display = 'block';
            } else {
                img.style.display = 'none';
            }
            nameSpan.textContent = '📎 ' + fileName;
            document.getElementById('chatInput').focus();
        }

        function clearUpload() {
            pendingUpload = null;
            document.getElementById('uploadPreviewBar').classList.remove('show');
            document.getElementById('uploadPreviewImg').style.display = 'none';
        }

        // ==================== CHAT ====================
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if ((!text && !pendingUpload) || isWaiting) return;

            const apiKey = localStorage.getItem('xiaoya_api_key');
            if (!apiKey) {
                openSettings();
                return;
            }

            // Prepare
            input.value = '';
            const hasAttachment = !!pendingUpload;
            const isImage = hasAttachment && pendingUpload.type === 'image';
            const uploadData = pendingUpload;
            pendingUpload = null;
            clearUpload();

            isWaiting = true;
            document.getElementById('sendBtn').disabled = true;

            // Prepare user message content
            let userContent;
            let displayText = text;

            if (isImage && text) {
                // Multimodal: image + text
                userContent = [
                    { type: 'image_url', image_url: { url: uploadData.data } },
                    { type: 'text', text: text },
                ];
                displayText = text + ' [📷图片]';
            } else if (isImage) {
                userContent = [
                    { type: 'image_url', image_url: { url: uploadData.data } },
                    { type: 'text', text: '看看这张照片~' },
                ];
                displayText = '[📷图片] 看看这张照片~';
            } else if (uploadData && uploadData.type === 'file') {
                const filePreview = uploadData.data.substring(0, 500);
                userContent = text
                    ? `[文件: ${uploadData.name}]\n内容:\n${filePreview}\n\n用户消息: ${text}`
                    : `[文件: ${uploadData.name}]\n内容:\n${filePreview}`;
                displayText = text || `[📄文件: ${uploadData.name}]`;
            } else {
                userContent = text;
            }

            // Display user message
            addMessage('you', displayText, uploadData);
            conversationHistory.push({ role: 'user', content: userContent });

            // Typing indicator
            const typingEl = showTyping();

            try {
                const model = isImage ? VISION_MODEL : TEXT_MODEL;
                const recentHistory = conversationHistory.slice(-20);

                let messages;
                if (isImage) {
                    // For vision model, include system prompt as a user-like message
                    // because qwen-vl may not support system role perfectly
                    messages = [
                        { role: 'user', content: SYSTEM_PROMPT + '\n\n好的，我会以小雅的身份和你聊天！' },
                        { role: 'assistant', content: '知道啦~ 我就是你的小雅 💕' },
                        ...recentHistory,
                    ];
                } else {
                    messages = [
                        { role: 'system', content: SYSTEM_PROMPT },
                        ...recentHistory,
                    ];
                }

                const response = await fetch(DASHSCOPE_API, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`,
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: messages,
                        temperature: 0.9,
                        max_tokens: 300,
                    }),
                });

                typingEl.remove();

                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.message || `API 错误 ${response.status}`);
                }

                const data = await response.json();
                const reply = data.choices[0].message.content;

                addMessage('her', reply);
                conversationHistory.push({ role: 'assistant', content: reply });

                // TTS
                speakText(reply);

            } catch (err) {
                typingEl.remove();
                const errMsg = '哎呀，信号不太好呢~ 你等等我，我马上回来... 💕\n\n（' + err.message + '）';
                addMessage('her', errMsg);
                speakText('哎呀，信号不太好呢~ 你等等我，我马上回来');
            }

            isWaiting = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('chatInput').focus();
        }

        function addMessage(type, text, uploadData) {
            const container = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;

            // Avatar
            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'avatar';
            if (type === 'her') {
                avatarDiv.innerHTML = `<img src="${photos[0].src}" alt="小雅" onerror="this.parentElement.innerHTML='💋'">`;
            } else {
                avatarDiv.textContent = '🙂';
            }

            // Bubble
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'bubble';

            // If user sent an image, show thumbnail
            if (type === 'you' && uploadData && uploadData.type === 'image') {
                const img = document.createElement('img');
                img.className = 'uploaded-img';
                img.src = uploadData.data;
                img.alt = '上传的图片';
                img.onclick = () => window.open(uploadData.data, '_blank');
                bubbleDiv.appendChild(img);
            }
            if (type === 'you' && uploadData && uploadData.type === 'file') {
                const fileDiv = document.createElement('div');
                fileDiv.className = 'file-attach';
                fileDiv.textContent = '📄 ' + uploadData.name;
                bubbleDiv.appendChild(fileDiv);
            }

            const textSpan = document.createElement('span');
            textSpan.textContent = typeof text === 'string' ? text : '';
            bubbleDiv.appendChild(textSpan);

            msgDiv.appendChild(avatarDiv);
            msgDiv.appendChild(bubbleDiv);
            container.appendChild(msgDiv);

            container.scrollTop = container.scrollHeight;
        }

        function showTyping() {
            const container = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message her';
            msgDiv.id = 'typingMsg';

            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'avatar';
            avatarDiv.innerHTML = `<img src="${photos[0].src}" alt="小雅" onerror="this.parentElement.innerHTML='💋'">`;

            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'bubble';
            bubbleDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

            msgDiv.appendChild(avatarDiv);
            msgDiv.appendChild(bubbleDiv);
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;

            return msgDiv;
        }

        // ==================== SETTINGS ====================
        function openSettings() {
            document.getElementById('settingsModal').classList.remove('hidden');
            const savedKey = localStorage.getItem('xiaoya_api_key');
            if (savedKey) {
                document.getElementById('apiKeyInput').value = savedKey;
            }
            updateApiStatus(!!savedKey);
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.add('hidden');
        }

        function saveApiKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            if (!key) {
                alert('请输入 API Key');
                return;
            }
            if (!key.startsWith('sk-')) {
                alert('API Key 格式不正确，通义千问的 Key 以 sk- 开头');
                return;
            }
            localStorage.setItem('xiaoya_api_key', key);
            updateApiStatus(true);
            closeSettings();
        }

        function updateApiStatus(hasKey) {
            const el = document.getElementById('apiStatus');
            if (hasKey) {
                el.innerHTML = '<span class="status-badge ok">✅ API Key 已配置</span>';
            } else {
                el.innerHTML = '<span class="status-badge err">⚠️ 未配置 API Key</span>';
            }
        }

        // ==================== START ====================
        init();
    </script>
</body>
</html>
